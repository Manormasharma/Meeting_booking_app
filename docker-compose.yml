services:
  mongo:
    image: mongo:6
    restart: always
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/meeting_booking
      - JWT_SECRET=your_jwt_secret
      - PORT=5000
      - AI_SERVICE_URL=http://ai-service:6000/api/ai-bookings
      - APP_TIMEZONE=Asia/Kolkata
    depends_on:
      - mongo
      - ai-service
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
  ai-service:
    build: ./ai-service
    restart: always
    ports:
      - "6000:6000"
    environment:
      - PORT=6000
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=llama3.1
      - OPENAI_MODEL=gpt-4o-mini
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - ollama
    volumes:
      - ./ai-service:/usr/src/app
      - /usr/src/app/node_modules
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REACT_APP_API_BASE=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
volumes:
  mongo-data:
  ollama-data:

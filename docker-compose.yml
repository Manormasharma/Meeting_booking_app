version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: always
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
  backend:
    build: ./backend
    restart: always
    ports:
      - 5001:5000
    environment:
      - MONGO_URI=mongodb://host.docker.internal:27017/meeting_booking
      - JWT_SECRET=your_jwt_secret
      - PORT=5000
    depends_on:
      - mongo
    volumes:
      - ./backend:/usr/src/app
  ai-service:
    build: ./ai-service
    restart: always
    ports:
      - 6000:6000
    env_file:
      - ./ai-service/.env.example
    depends_on:
      - backend
    volumes:
      - ./ai-service:/usr/src/app
  frontend:
    build: ./frontend
    restart: always
    ports:
      - 7001:7000
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - 11434:11434
volumes:
  mongo-data:
